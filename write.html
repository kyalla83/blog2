<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛집 블로그 작성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f8f8f8; color:#222; font-size:15px; }
header { background:#fff; border-bottom:1px solid #e5e5e5; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:1.2rem; font-weight:700; }
header a { font-size:13px; color:#4a6cf7; text-decoration:none; }
.wrap { max-width:820px; margin:2rem auto; padding:0 1rem; }
.card { background:#fff; border:1px solid #e5e5e5; border-radius:12px; padding:1.2rem 1.5rem; margin-bottom:1rem; }
.card h2 { font-size:14px; font-weight:600; color:#444; margin-bottom:12px; }
label { font-size:13px; color:#888; display:block; margin-bottom:5px; }
input[type=text], input[type=url], input[type=password], textarea {
  width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:8px;
  font-size:14px; font-family:inherit; margin-bottom:12px;
}
textarea { min-height:72px; resize:vertical; }
.row { display:flex; gap:8px; margin-bottom:12px; }
.row input { flex:1; margin-bottom:0; }
.row button { padding:8px 14px; border:1px solid #ddd; border-radius:8px; background:#fff; font-size:13px; cursor:pointer; white-space:nowrap; }
.badge { display:inline-block; font-size:12px; padding:3px 10px; border-radius:20px; background:#eef4ff; color:#4a6cf7; margin-bottom:12px; }
.btn-main { width:100%; padding:13px; font-size:15px; font-weight:700; cursor:pointer; background:#4a6cf7; color:#fff; border:none; border-radius:10px; margin-top:4px; }
.btn-main:hover { background:#3a5ce6; }
.btn-main:disabled { background:#aaa; cursor:not-allowed; }
.result { display:none; background:#f9f9f9; border:1px solid #e5e5e5; border-radius:10px; padding:1rem; margin-top:10px; }
.result-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.result-top span { font-size:13px; font-weight:600; color:#444; }
.copy-btn { font-size:13px; padding:4px 12px; border:1px solid #ddd; border-radius:8px; background:#fff; cursor:pointer; }
pre { font-size:14px; line-height:1.8; white-space:pre-wrap; word-break:break-word; font-family:inherit; max-height:380px; overflow-y:auto; }
.err { font-size:13px; color:#e24b4a; margin-top:6px; }
.loading { font-size:14px; color:#888; }
</style>
</head>
<body>
<header>
  <h1>✍️ 맛집 블로그 작성기</h1>
  <a href="index.html">← 블로그 보기</a>
</header>

<div class="wrap">

  <div class="card">
    <h2>Anthropic API 키</h2>
    <label>API 키 입력 (브라우저 세션에만 저장, 새로고침하면 초기화)</label>
    <div class="row">
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
      <button onclick="saveKey()">저장</button>
    </div>
    <div id="keyStatus" style="font-size:13px;color:#4a6cf7;display:none;">저장됐어요!</div>
  </div>

  <div class="card" id="sec-saengsaeng">
    <span class="badge">2TV 생생정보</span>
    <label>기사 링크 (선택)</label>
    <input type="url" id="url-saengsaeng" placeholder="https://..." />
    <label>소개된 맛집 상호명 (줄바꿈으로 구분)</label>
    <textarea id="names-saengsaeng" placeholder="수원 왕갈비&#10;부산 돼지국밥&#10;광주 떡갈비"></textarea>
    <div class="result" id="result-saengsaeng">
      <div class="result-top"><span>생성된 블로그 글</span><button class="copy-btn" onclick="copy('saengsaeng')">복사</button></div>
      <pre id="content-saengsaeng"></pre>
    </div>
    <div class="err" id="err-saengsaeng"></div>
  </div>

  <div class="card" id="sec-today">
    <span class="badge">생방송투데이</span>
    <label>기사 링크 (선택)</label>
    <input type="url" id="url-today" placeholder="https://..." />
    <label>소개된 맛집 상호명 (줄바꿈으로 구분)</label>
    <textarea id="names-today" placeholder="수원 왕갈비&#10;부산 돼지국밥&#10;광주 떡갈비"></textarea>
    <div class="result" id="result-today">
      <div class="result-top"><span>생성된 블로그 글</span><button class="copy-btn" onclick="copy('today')">복사</button></div>
      <pre id="content-today"></pre>
    </div>
    <div class="err" id="err-today"></div>
  </div>

  <div class="card" id="sec-hometown">
    <span class="badge">6시내고향</span>
    <label>기사 링크 (선택)</label>
    <input type="url" id="url-hometown" placeholder="https://..." />
    <label>소개된 맛집 상호명 (줄바꿈으로 구분)</label>
    <textarea id="names-hometown" placeholder="수원 왕갈비&#10;부산 돼지국밥&#10;광주 떡갈비"></textarea>
    <div class="result" id="result-hometown">
      <div class="result-top"><span>생성된 블로그 글</span><button class="copy-btn" onclick="copy('hometown')">복사</button></div>
      <pre id="content-hometown"></pre>
    </div>
    <div class="err" id="err-hometown"></div>
  </div>

  <button class="btn-main" id="genBtn" onclick="generateAll()">3개 블로그 글 한번에 생성하기</button>

</div>

<script>
const SHOWS = [
  { id:'saengsaeng', label:'2TV 생생정보' },
  { id:'today',      label:'생방송투데이' },
  { id:'hometown',   label:'6시내고향' },
];

function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('ak', k);
  document.getElementById('apiKey').value = '';
  document.getElementById('apiKey').placeholder = '저장됨';
  const st = document.getElementById('keyStatus');
  st.style.display = 'block';
  setTimeout(() => st.style.display = 'none', 2000);
}

function getKey() {
  return localStorage.getItem('ak') || document.getElementById('apiKey').value.trim();
}

async function callClaude(apiKey, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      messages: [{ role:'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || 'API 오류 ' + res.status);
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
}

async function generateOne(show, apiKey) {
  const url   = document.getElementById('url-'   + show.id).value.trim();
  const names = document.getElementById('names-' + show.id).value.trim();
  const resEl = document.getElementById('result-'  + show.id);
  const conEl = document.getElementById('content-' + show.id);
  const errEl = document.getElementById('err-'     + show.id);
  errEl.textContent = '';
  if (!url && !names) { errEl.textContent = '링크 또는 상호명을 입력해주세요.'; return; }
  resEl.style.display = 'block';
  conEl.textContent = '글 작성 중...';
  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const prompt = `당신은 네이버 블로그 맛집 전문 블로거입니다.
오늘 날짜: ${today} | 방송: ${show.label}
${url   ? '기사 링크: ' + url   : ''}
${names ? '소개된 맛집 상호명:\n' + names : ''}

위 정보를 바탕으로 정보형 네이버 블로그 글을 작성하세요.
[제목] 오늘 ${show.label}에서 소개된 맛집을 담은 SEO 최적화 제목
[서론] 오늘 방송 소개 2~3문장
[본문] 소개된 맛집 각각: 식당명 / 위치 / 대표메뉴 / 특징 / 추천 포인트
[마무리] 방문 권유 2문장
[해시태그] 관련 해시태그 12개
규칙: 정보 전달 위주 객관적 문체, 이모지 적절히 사용, 900~1100자, 블로그 글만 출력`;
  try {
    const text = await callClaude(apiKey, prompt);
    conEl.textContent = text;
  } catch(e) {
    resEl.style.display = 'none';
    errEl.textContent = '오류: ' + e.message;
  }
}

async function generateAll() {
  const apiKey = getKey();
  if (!apiKey) { alert('API 키를 먼저 입력해주세요.'); return; }
  localStorage.setItem('ak', apiKey);
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '생성 중...';
  for (const show of SHOWS) { await generateOne(show, apiKey); }
  btn.disabled = false; btn.textContent = '3개 블로그 글 한번에 생성하기';
}

function copy(id) {
  const text = document.getElementById('content-' + id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    event.target.textContent = '복사됨!';
    setTimeout(() => event.target.textContent = '복사', 2000);
  });
}

if (localStorage.getItem('ak')) {
  document.getElementById('apiKey').placeholder = 'API 키 저장됨';
}
</script>
</body>
</html>
