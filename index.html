<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 맛집 블로그</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f8f8f8; color: #222; }
header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 1.2rem 2rem; }
header h1 { font-size: 1.3rem; font-weight: 700; }
.container { max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
.post-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; cursor: pointer; }
.post-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.post-date { font-size: 12px; color: #999; margin-bottom: 6px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #eef4ff; color: #4a6cf7; margin-right: 4px; margin-bottom: 8px; }
.post-preview { font-size: 14px; color: #555; line-height: 1.6; }
.detail { display: none; background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 2rem; margin-top: 1rem; }
.content { font-size: 15px; line-height: 1.9; white-space: pre-wrap; word-break: break-word; }
.copy-btn { margin-top: 1.2rem; padding: 8px 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; }
.close-btn { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
#status { text-align: center; padding: 3rem; color: #999; }
</style>
</head>
<body>
<header><h1>🍽️ 오늘의 맛집 블로그</h1></header>
<div class="container">
  <div id="list"></div>
  <div class="detail" id="detail"></div>
</div>
<script>
const BASE = location.href.includes('github.io') ? '' : '';

async function init() {
  const el = document.getElementById('list');
  el.innerHTML = '<div id="status">불러오는 중...</div>';
  try {
    const r = await fetch('posts/index.json?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const posts = await r.json();
    if (!posts.length) { el.innerHTML = '<div id="status">아직 포스트가 없어요.</div>'; return; }
    el.innerHTML = posts.map(p => `
      <div class="post-card" onclick="show('${p.date}')">
        <div class="post-date">${p.date}</div>
        <span class="badge">${p.region}</span><span class="badge">${p.category}</span>
        <div class="post-preview">${p.preview.replace(/\\n/g, ' ')}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div id="status">오류: ' + e.message + '</div>';
  }
}

async function show(date) {
  const d = document.getElementById('detail');
  d.style.display = 'block';
  d.innerHTML = '불러오는 중...';
  d.scrollIntoView({ behavior: 'smooth' });
  const r = await fetch('posts/' + date + '.json?v=' + Date.now());
  const p = await r.json();
  d.innerHTML = `
    <button class="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
    <div class="post-date">${p.date}</div>
    <span class="badge">${p.region}</span><span class="badge">${p.category}</span>
    <div class="content" style="margin-top:1rem">${p.content}</div>
    <button class="copy-btn" onclick="navigator.clipboard.writeText(document.querySelector('.content').innerText).then(()=>{this.textContent='✅ 복사됨!';setTimeout(()=>this.textContent='📋 복사',2000)})">📋 복사</button>`;
}

init();
</script>
</body>
</html>
