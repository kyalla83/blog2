name: 매일 맛집 블로그 자동 생성

on:
  schedule:
    - cron: '0 9 * * 1-5'   # UTC 09:00 = 한국 18:00 (평일만)
  workflow_dispatch:          # 수동 실행 버튼도 활성화

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install anthropic

      - name: 블로그 글 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_blog.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🍽️ 맛집 블로그 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
